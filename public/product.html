<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تفاصيل المنتج | الجوري ستور</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* تصميم صفحة المنتج */
        .product-details-container { max-width: 1200px; margin: 50px auto; padding: 30px; display: flex; gap: 40px; flex-wrap: wrap; background: #fff; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); }
        .product-image-box { flex: 1; min-width: 300px; text-align: center; }
        .product-image-box img { max-width: 100%; max-height: 500px; object-fit: contain; border-radius: 10px; padding: 10px; border: 1px solid #eef2f5; }
        
        .product-info-box { flex: 1.5; min-width: 300px; display: flex; flex-direction: column; justify-content: center; }
        .product-title { color: #1d364a; font-size: 32px; margin-top: 0; margin-bottom: 15px; }
        .product-price { color: #f38c18; font-size: 28px; font-weight: bold; margin-bottom: 20px; }
        
        .btn-add-large:hover { opacity: 0.9; transform: translateY(-2px); }
        .btn-add-large:disabled { background: #ccc !important; color: #666 !important; cursor: not-allowed !important; transform: none; }
    </style>
</head>
<body>
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول | الجوري ستور</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="site-header"></div>
<script src="js/header-loader.js"></script>

    <div class="auth-container" style="max-width: 500px; margin: 50px auto; background: #fff; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);">
        
        <div id="loginFormBox">
            <h2 id="loginTitle" style="text-align: center; color: #1d364a; margin-bottom: 20px;">تسجيل الدخول</h2>
            <form onsubmit="doLogin(event)">
                <div class="form-group">
                    <label id="labelLoginPhone">رقم التليفون</label>
                    <input type="tel" class="form-control" id="loginPhone" required>
                </div>
                <div class="form-group">
                    <label id="labelLoginPassword">كلمة المرور</label>
                    <input type="password" class="form-control" id="loginPassword" required>
                </div>
                <button type="submit" class="btn-auth" id="btnLoginSubmit" style="width: 100%; padding: 12px; background: #1d364a; color: white; border: none; border-radius: 5px; font-weight: bold; font-size: 16px; cursor: pointer;">دخول</button>
            </form>
            <div class="auth-switch" style="text-align: center; margin-top: 15px;">
                <span id="noAccountText">ليس لديك حساب؟</span> 
                <a onclick="toggleAuth('register')" id="linkToRegister" style="color: #f38c18; cursor: pointer; font-weight: bold;">إنشاء حساب جديد</a>
            </div>
            <div style="text-align: center; margin-top: 10px;">
                <a onclick="toggleAuth('forgot')" style="color: #999; cursor: pointer; font-size: 14px;">نسيت كلمة المرور؟</a>
            </div>
        </div>

        <div id="registerFormBox" style="display:none;">
            <h2 id="registerTitle" style="text-align: center; color: #1d364a; margin-bottom: 20px;">إنشاء حساب جديد</h2>
            <form onsubmit="doRegister(event)">
                <div class="form-group">
                    <label id="labelFullName">الاسم بالكامل</label>
                    <input type="text" class="form-control" id="regName" required>
                </div>
                <div class="form-group">
                    <label>رقم التليفون (للدخول)</label>
                    <input type="tel" class="form-control" id="regPhone" required>
                </div>
                <div class="form-group">
                    <label>البريد الإلكتروني (لاسترجاع الحساب)</label>
                    <input type="email" class="form-control" id="regEmail" required>
                </div>
                <div class="form-group">
                    <label>المنطقة / المحافظة</label>
                    <select class="form-control" id="regRegion" required>
                        <option value="">-- اختر المنطقة --</option>
                        </select>
                </div>
                <div class="form-group">
                    <label>العنوان بالتفصيل</label>
                    <input type="text" class="form-control" id="regAddress" required>
                </div>
                <div class="form-group">
                    <label id="labelRegPassword">كلمة المرور</label>
                    <input type="password" class="form-control" id="regPassword" required>
                </div>
                
                <button type="submit" class="btn-auth" style="width: 100%; padding: 12px; background: #28a745; color: white; border: none; border-radius: 5px; font-weight: bold; font-size: 16px; cursor: pointer;">إنشاء الحساب</button>
            </form>
            <div class="auth-switch" style="text-align: center; margin-top: 15px;">
                <span id="hasAccountText">لديك حساب بالفعل؟</span> 
                <a onclick="toggleAuth('login')" style="color: #1d364a; cursor: pointer; font-weight: bold;">تسجيل الدخول</a>
            </div>
        </div>

        <div id="forgotFormBox" style="display:none;">
            <h2 style="text-align: center; color: #1d364a; margin-bottom: 20px;">استرجاع كلمة المرور</h2>
            <p style="text-align: center; color: #666; font-size: 14px; margin-bottom: 20px;">أدخل بريدك الإلكتروني وسنرسل لك كلمة مرور جديدة.</p>
            <form onsubmit="doForgotPassword(event)">
                <div class="form-group">
                    <label>البريد الإلكتروني</label>
                    <input type="email" class="form-control" id="forgotEmail" required>
                </div>
                <button type="submit" class="btn-auth" style="width: 100%; padding: 12px; background: #f38c18; color: #1d364a; border: none; border-radius: 5px; font-weight: bold; font-size: 16px; cursor: pointer;">إرسال كلمة المرور</button>
            </form>
            <div class="auth-switch" style="text-align: center; margin-top: 15px;">
                <a onclick="toggleAuth('login')" style="color: #1d364a; cursor: pointer; font-weight: bold;">العودة لتسجيل الدخول</a>
            </div>
        </div>

    </div>

<!-- 1. مكتبات فايربيس الأساسية (بما فيها الـ Storage عشان الإيرور يختفي) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-storage-compat.js"></script>

    <!-- 2. ملفات متجرك -->
    <script src="js/firebase-init.js"></script>
    <script src="js/store-core.js"></script>
    <script src="script.js"></script>
</body>
</html>
    <div id="singleProductContainer" class="product-details-container">
        <h2 style="text-align:center; width:100%; color:#1d364a;">جاري تحميل تفاصيل المنتج...</h2>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>
    
    <script src="js/firebase-init.js"></script>
    <script src="js/store-core.js"></script>
    <script src="script.js"></script>

    <script>
        window.renderSingleProduct = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const productId = urlParams.get('id');
            const container = document.getElementById("singleProductContainer");

            if(!productId) {
                container.innerHTML = "<h2 style='text-align:center; width:100%; color:#d9534f;'>المنتج غير موجود! تأكد من الرابط.</h2>";
                return;
            }

            let products = JSON.parse(localStorage.getItem("eljory_products")) || [];
            let p = products.find(item => item.id === productId);

            // لو المنتج لسه محملش من فايربيس، هنجرب تاني بعد ثانية واحدة أوتوماتيك
            if(!p) {
                setTimeout(() => {
                    products = JSON.parse(localStorage.getItem("eljory_products")) || [];
                    p = products.find(item => item.id === productId);
                    if(!p) {
                        container.innerHTML = "<h2 style='text-align:center; width:100%; color:#d9534f;'>عذراً، هذا المنتج غير متوفر حالياً.</h2>";
                    } else {
                        drawProductDetails(p, container);
                    }
                }, 1000);
                return;
            }
            
            drawProductDetails(p, container);
        }

        function drawProductDetails(p, container) {
            let pName = currentLang === 'ar' ? p.titleAr : (p.titleEn || p.titleAr);
            let pDesc = currentLang === 'ar' ? (p.descAr || "لا يوجد وصف متاح لهذا المنتج.") : (p.descEn || p.descAr || "No description available.");
            let curr = currentLang === 'ar' ? 'ج.م' : 'EGP';
            let btnTxt = currentLang === 'ar' ? 'أضف للسلة' : 'Add to Cart';
            
            let pointsTxt = "";
            if (p.points > 0) {
                pointsTxt = currentLang === 'ar' ? 
                `<p style="color:#28a745; font-weight:bold; font-size: 16px;">🎁 ستحصل على ${p.points} نقطة عند الشراء</p>` : 
                `<p style="color:#28a745; font-weight:bold; font-size: 16px;">🎁 You will get ${p.points} points</p>`;
            }

            let stockStatus = "";
            let btnDisabled = "";
            
            if(p.stock <= 0) {
                stockStatus = `<span style="color:#d9534f; font-weight:bold; font-size:18px;">${currentLang === 'ar' ? 'نفدت الكمية ❌' : 'Out of Stock ❌'}</span>`;
                btnDisabled = "disabled";
            } else {
                stockStatus = `<span style="color:#28a745; font-weight:bold; font-size:16px;">${currentLang === 'ar' ? 'متوفر في المخزون ✅' : 'In Stock ✅'}</span>`;
            }

            if (typeof fbq === 'function') {
                fbq('track', 'ViewContent', {
                    content_ids: [p.id],
                    content_type: 'product',
                    value: p.price,
                    currency: 'EGP'
                });
            }

            container.innerHTML = `
                <div class="product-image-box">
                    <img src="${p.img}" alt="${pName}">
                </div>
                <div class="product-info-box">
                    <h1 class="product-title">${pName}</h1>
                    <p class="product-price">${p.price} ${curr}</p>
                    ${pointsTxt}
                    <p style="margin-bottom: 20px;">${stockStatus}</p>
                    <p style="line-height: 1.8; color: #555; font-size: 16px; margin-bottom: 30px;">${pDesc}</p>
                    
                    <div style="display: flex; gap: 15px; align-items: center; margin-bottom: 20px; flex-wrap: wrap;">
                        <div class="qty-container" style="margin: 0; display: flex; align-items: center;">
                            <button class="qty-btn" onclick="increaseQty('prodQty', '${p.id}')" ${btnDisabled}>+</button>
                            <input type="text" id="prodQty" class="qty-input" value="1" readonly style="width: 50px; height: 40px; font-size: 18px; text-align: center; border: 1px solid #ccc;">
                            <button class="qty-btn" onclick="decreaseQty('prodQty')" ${btnDisabled}>-</button>
                        </div>
                        <button class="btn-add-large" onclick="addToCart('${p.id}', ${p.price}, 'prodQty')" ${btnDisabled} style="flex: 1; padding: 15px; background: #f38c18; color: #1d364a; font-weight: bold; font-size: 18px; border: none; border-radius: 8px; cursor: pointer; transition: 0.3s;">
                            🛒 ${btnTxt}
                        </button>
                    </div>
                </div>
            `;
            
            document.title = pName + " | الجوري ستور";
        }

        document.addEventListener("DOMContentLoaded", () => {
            renderSingleProduct();
        });
    </script>
</body>
</html>
