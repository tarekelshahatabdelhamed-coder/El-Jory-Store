<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Jory Store | الجوري ستور</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>

        /* ══════════════════════════════════════
           BASE
        ══════════════════════════════════════ */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Cairo', sans-serif; background: #f8fafc; color: #1d364a; }

        /* ══════════════════════════════════════
           HERO
        ══════════════════════════════════════ */
        .jory-hero {
            background: #1d364a;
            padding: 56px 24px 64px;
            text-align: center;
            color: #fff;
            position: relative;
            overflow: hidden;
        }
        .jory-hero-circle-1 {
            position: absolute; top: -80px; right: -80px;
            width: 340px; height: 340px;
            background: rgba(243,140,24,.1);
            border-radius: 50%; pointer-events: none;
        }
        .jory-hero-circle-2 {
            position: absolute; bottom: -100px; left: -100px;
            width: 420px; height: 420px;
            background: rgba(243,140,24,.07);
            border-radius: 50%; pointer-events: none;
        }
        .jory-hero-inner {
            position: relative; z-index: 1;
            max-width: 680px; margin: 0 auto;
        }
        .jory-hero-badge {
            display: inline-block;
            background: rgba(243,140,24,.18);
            color: #f8b468;
            border: 1px solid rgba(243,140,24,.35);
            border-radius: 100px;
            padding: 6px 22px; font-size: 13px; font-weight: 700;
            margin-bottom: 20px;
        }
        .jory-hero h1 {
            font-size: clamp(24px, 5vw, 44px);
            font-weight: 900; line-height: 1.4;
            margin-bottom: 14px; color: #fff; min-height: 1em;
        }
        .jory-hero h1:empty { display: none; }
        .jory-hero p {
            font-size: clamp(14px, 2vw, 17px);
            color: rgba(255,255,255,.7);
            margin-bottom: 32px; line-height: 1.85;
        }
        .jory-hero p:empty { margin-bottom: 32px; }
        .jory-hero-btns {
            display: flex; gap: 12px;
            justify-content: center; flex-wrap: wrap;
        }
        .jory-btn-primary {
            background: #f38c18; color: #fff; border: none;
            border-radius: 10px; padding: 13px 32px;
            font-family: 'Cairo',sans-serif; font-size: 15px; font-weight: 700;
            cursor: pointer; text-decoration: none; display: inline-block;
            transition: background .2s, transform .15s;
        }
        .jory-btn-primary:hover { background: #d97b0e; transform: translateY(-2px); }
        .jory-btn-secondary {
            background: transparent; color: #fff;
            border: 2px solid rgba(255,255,255,.3);
            border-radius: 10px; padding: 13px 32px;
            font-family: 'Cairo',sans-serif; font-size: 15px; font-weight: 700;
            cursor: pointer; text-decoration: none; display: inline-block;
            transition: border-color .2s, background .2s;
        }
        .jory-btn-secondary:hover {
            border-color: #f38c18;
            background: rgba(243,140,24,.1);
        }

        /* ══════════════════════════════════════
           السلايدر
        ══════════════════════════════════════ */
        .slider-container {
            max-width: 1200px; margin: 32px auto;
            position: relative; border-radius: 16px;
            overflow: hidden; box-shadow: 0 4px 24px rgba(0,0,0,.12);
        }
        .slide { display: none; width: 100%; }
        .slide.active { display: block; }

        /* انتقال أسلس */
        .slide img {
            width: 100%; height: auto;
            max-height: 440px; object-fit: cover;
            aspect-ratio: 3/1; display: block;
            transition: opacity .6s ease;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: scale(1.02); }
            to   { opacity: 1; transform: scale(1); }
        }
        .slide.active img { animation: slideIn .6s ease; }

        .prev-slide, .next-slide {
            cursor: pointer; position: absolute; top: 50%;
            transform: translateY(-50%);
            padding: 14px 18px; color: #fff; font-size: 20px; font-weight: bold;
            background: rgba(0,0,0,.3); user-select: none; z-index: 2; transition: .3s;
        }
        .next-slide { right: 0; border-radius: 10px 0 0 10px; }
        .prev-slide { left: 0;  border-radius: 0 10px 10px 0; }
        .prev-slide:hover, .next-slide:hover { background: rgba(243,140,24,.85); }

        .slider-dots { text-align: center; padding: 10px 0; }
        .slider-dot {
            display: inline-block; width: 8px; height: 8px;
            border-radius: 50%; background: #d1d5db;
            margin: 0 4px; cursor: pointer; transition: .3s;
        }
        .slider-dot.active { background: #f38c18; transform: scale(1.4); }

        /* ══════════════════════════════════════
           السكاشن والمنتجات
        ══════════════════════════════════════ */
        #storefrontSections { margin: 10px 0; }
        .products-grid {
            display: flex; justify-content: center;
            gap: 24px; flex-wrap: wrap; padding: 20px 5%;
        }
        .jory-section {
            opacity: 0; transform: translateY(20px);
            transition: opacity .5s ease, transform .5s ease;
        }
        .jory-section.visible { opacity: 1; transform: translateY(0); }

        /* ══════════════════════════════════════
           MOBILE
        ══════════════════════════════════════ */
        @media (max-width: 768px) {
            .jory-hero { padding: 36px 16px 44px; }
            .jory-hero-badge { font-size: 12px; padding: 5px 16px; margin-bottom: 14px; }
            .jory-hero h1 { font-size: clamp(22px, 6vw, 30px); margin-bottom: 12px; }
            .jory-hero p  { font-size: 14px; margin-bottom: 24px; }
            .jory-hero-btns { flex-direction: column; align-items: stretch; gap: 10px; }
            .jory-btn-primary, .jory-btn-secondary {
                text-align: center; padding: 13px 20px; font-size: 15px;
            }
            .slider-container { margin: 16px 12px; border-radius: 10px; }
            .slide img { max-height: 180px; aspect-ratio: auto; object-fit: cover; }
            .prev-slide, .next-slide { padding: 10px 12px; font-size: 16px; }
            .products-grid { gap: 14px; padding: 16px 12px; }
        }
        @media (max-width: 380px) {
            .jory-hero { padding: 28px 12px 36px; }
            .jory-hero h1 { font-size: 20px; }
        }

    </style>
</head>
<body>

    <!-- ══ الهيدر المشترك — header-loader.js يحقنه هنا ══ -->
    <div id="site-header"></div>
    <script src="js/header-loader.js"></script>

    <!-- ══ Hero ══ -->
    <section class="jory-hero" id="heroSection">
        <div class="jory-hero-circle-1"></div>
        <div class="jory-hero-circle-2"></div>
        <div class="jory-hero-inner">
            <div class="jory-hero-badge" id="heroBadge">✦ الجوري ستور</div>
            <h1 id="welcomeTitle"></h1>
            <p  id="welcomeDesc"></p>
            <div class="jory-hero-btns">
                <a href="categories.html" class="jory-btn-primary">تسوق دلوقتي</a>
                <a href="categories.html" class="jory-btn-secondary">شوف الأقسام</a>
            </div>
        </div>
    </section>

    <!-- ══ السلايدر ══ -->
    <div id="sliderContainer" class="slider-container" style="display:none;"></div>
    <div id="sliderDots"      class="slider-dots"      style="display:none;"></div>

    <!-- ══ السكاشن ══ -->
    <div id="storefrontSections"></div>

    <!-- ══ المنتجات ══ -->
    <div id="productsContainer" class="products-grid"></div>

    <!-- ══ Firebase ══ -->
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-storage-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>

    <!-- ══ Core ══ -->
    <script src="js/firebase-init.js"></script>
    <script src="js/store-core.js"></script>
    <script src="js/sections-renderer.js"></script>
    <script src="script.js"></script>

    <script>
    // ══════════════════════════════════════════════════════
    //  السلايدر الإعلاني
    // ══════════════════════════════════════════════════════
    var currentBannerIndex = 0;
    var bannerInterval;

    window.renderBanners = function () {
        var banners = JSON.parse(localStorage.getItem('eljory_banners') || '[]');
        var slider  = document.getElementById('sliderContainer');
        var dotsEl  = document.getElementById('sliderDots');
        if (!slider) return;

        var active = banners
            .filter(function(b) { return b.isActive !== false; })
            .sort(function(a, b) { return (a.priority || 0) - (b.priority || 0); });

        if (!active.length) {
            slider.style.display = 'none';
            dotsEl.style.display = 'none';
            return;
        }

        slider.style.display = 'block';
        currentBannerIndex   = 0;

        // بناء الشرائح
        var slidesHTML = active.map(function(b, i) {
            var action = '';
            if      (b.linkType === 'product'     && b.linkValue) action = 'onclick="location.href=\'product.html?id='    + b.linkValue + '\'"';
            else if (b.linkType === 'category'    && b.linkValue) action = 'onclick="location.href=\'shop.html?cat='      + b.linkValue + '\'"';
            else if (b.linkType === 'subcategory' && b.linkValue) action = 'onclick="location.href=\'shop.html?list='     + b.linkValue + '\'"';
            else if (b.linkType === 'external'    && b.linkValue) action = 'onclick="window.open(\'' + b.linkValue + '\',\'_blank\')"';

            return '<div class="slide' + (i === 0 ? ' active' : '') + '"'
                 +   (action ? ' style="cursor:pointer;" ' + action : '') + '>'
                 +   '<img src="' + b.img + '" alt="' + (b.title || 'El Jory') + '">'
                 + '</div>';
        }).join('');

        var navHTML = active.length > 1
            ? '<a class="prev-slide" onclick="changeSlide(-1)">&#10094;</a>'
            + '<a class="next-slide" onclick="changeSlide(1)">&#10095;</a>'
            : '';

        slider.innerHTML = slidesHTML + navHTML;

        // نقاط التنقل
        if (active.length > 1) {
            dotsEl.style.display = 'block';
            dotsEl.innerHTML = active.map(function(_, i) {
                return '<span class="slider-dot' + (i === 0 ? ' active' : '') + '"'
                     + ' onclick="goToSlide(' + i + ')"></span>';
            }).join('');
        } else {
            dotsEl.style.display = 'none';
        }

        // 6.5 ثانية — وقت كافي لقراءة البانر
        clearInterval(bannerInterval);
        if (active.length > 1) bannerInterval = setInterval(function() { changeSlide(1); }, 6500);
    };

    window.changeSlide = function (n) {
        var slides = document.querySelectorAll('.slide');
        if (!slides.length) return;
        slides[currentBannerIndex].classList.remove('active');
        updateDot(currentBannerIndex, false);
        currentBannerIndex = (currentBannerIndex + n + slides.length) % slides.length;
        slides[currentBannerIndex].classList.add('active');
        updateDot(currentBannerIndex, true);
    };

    window.goToSlide = function (idx) {
        var slides = document.querySelectorAll('.slide');
        if (!slides.length) return;
        slides[currentBannerIndex].classList.remove('active');
        updateDot(currentBannerIndex, false);
        currentBannerIndex = idx;
        slides[currentBannerIndex].classList.add('active');
        updateDot(currentBannerIndex, true);
    };

    function updateDot(idx, isActive) {
        var allDots = document.querySelectorAll('.slider-dot');
        if (allDots[idx]) allDots[idx].classList.toggle('active', isActive);
    }

    // ══════════════════════════════════════════════════════
    //  Intersection Observer
    // ══════════════════════════════════════════════════════
    function observeSections() {
        if (!('IntersectionObserver' in window)) {
            document.querySelectorAll('.jory-section').forEach(function(el) {
                el.classList.add('visible');
            });
            return;
        }
        var obs = new IntersectionObserver(function(entries) {
            entries.forEach(function(e) {
                if (e.isIntersecting) { e.target.classList.add('visible'); obs.unobserve(e.target); }
            });
        }, { threshold: 0.08 });
        document.querySelectorAll('.jory-section').forEach(function(el) { obs.observe(el); });
    }

    // ══════════════════════════════════════════════════════
    //  التهيئة
    // ══════════════════════════════════════════════════════
    document.addEventListener('DOMContentLoaded', function () {
        setTimeout(function () {
            if (typeof renderBanners            === 'function') renderBanners();
            if (typeof renderStorefrontSections === 'function') {
                renderStorefrontSections();
                setTimeout(observeSections, 100);
            }
        }, 700);
    });
    </script>

</body>
</html>
