<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Jory Store | الجوري ستور</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* ── السلايدر الإعلاني ── */
        .slider-container { max-width:1200px; margin:20px auto; position:relative; border-radius:10px; overflow:hidden; box-shadow:0 4px 16px rgba(0,0,0,.12); }
        .slide { display:none; width:100%; }
        .slide img { width:100%; height:auto; max-height:420px; object-fit:cover; aspect-ratio:3/1; display:block; }
        .fade { animation:fade 1.5s; }
        @keyframes fade { from{opacity:.4} to{opacity:1} }
        .prev-slide, .next-slide {
            cursor:pointer; position:absolute; top:50%; transform:translateY(-50%);
            padding:16px; color:white; font-size:24px; font-weight:bold;
            background:rgba(0,0,0,.3); border-radius:3px; user-select:none; z-index:2; transition:.3s;
        }
        .next-slide { right:0; border-radius:3px 0 0 3px; }
        .prev-slide { left:0;  border-radius:0 3px 3px 0; }
        .prev-slide:hover, .next-slide:hover { background:rgba(243,140,24,.85); }
        .slider-dots { text-align:center; padding:8px 0; }
        .slider-dot {
            display:inline-block; width:10px; height:10px; border-radius:50%;
            background:#ccc; margin:0 4px; cursor:pointer; transition:.3s;
        }
        .slider-dot.active { background:#f38c18; transform:scale(1.2); }

        /* ── السكاشن الاحترافية ── */
        .jory-section { transition:box-shadow .3s; }
        #storefrontSections { margin:10px 0; }
        .products-grid { display:flex; justify-content:center; gap:24px; flex-wrap:wrap; }

        /* ── تأثير ظهور عند التمرير ── */
        .jory-section { opacity:0; transform:translateY(20px); transition:opacity .5s ease, transform .5s ease; }
        .jory-section.visible { opacity:1; transform:translateY(0); }
    </style>
</head>
<body>
    <header>
        <div class="logo"><img src="logo.png" alt="لوجو الجوري ستور"></div>

        <nav style="display:flex; align-items:center; gap:20px;">
            <form onsubmit="performSearch(event)" style="display:flex; gap:5px; align-items:center; margin:0;">
                <input type="text" id="searchInput" placeholder="ابحث عن منتج..."
                       style="padding:8px 12px; border-radius:4px; border:1px solid #ccc; outline:none; min-width:200px;">
                <button type="submit" id="searchBtn"
                        style="background:#f38c18; color:#1d364a; border:none; padding:8px 15px;
                               border-radius:4px; font-weight:bold; cursor:pointer; transition:.3s;">بحث</button>
            </form>

            <ul>
                <li><a href="index.html" id="navHome">الرئيسية</a></li>
                <li class="dropdown">
                    <a href="categories.html" id="navCategories">الأقسام</a>
                    <div class="dropdown-content" id="dynamicNavCategories"></div>
                </li>
                <li style="position:relative; display:inline-flex; align-items:center; margin:0 5px;">
                    <a href="cart.html" id="navCartIcon" title="السلة"
                       style="color:inherit; display:flex; align-items:center; transition:.3s;">
                        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28"
                             viewBox="0 0 24 24" fill="none" stroke="currentColor"
                             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="9" cy="21" r="1"></circle>
                            <circle cx="20" cy="21" r="1"></circle>
                            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                        </svg>
                    </a>
                    <span id="cartBadge" class="cart-badge"
                          style="display:none; position:absolute; top:-10px; right:-10px;
                                 background:red; color:white; border-radius:50%; padding:2px 6px; font-size:12px;">0</span>
                </li>
                <li><a href="account.html" id="navAccount">حسابي</a></li>
            </ul>
        </nav>

        <div class="header-actions">
            <div class="user-info" id="headerUserInfo"></div>
            <div class="lang-switch"><button id="langBtn">English</button></div>
        </div>
    </header>

    <!-- ══ قسم الترحيب ══ -->
    <div class="welcome-section">
        <h1 id="welcomeTitle">مرحباً بك في الجوري ستور</h1>
        <p id="welcomeDesc">أفضل واقيات الشاشات الأكريليك في مصر</p>
    </div>

    <!-- ══ السلايدر الإعلاني (البانرات القديمة) ══ -->
    <div id="sliderContainer" class="slider-container" style="display:none;"></div>
    <div id="sliderDots" class="slider-dots" style="display:none;"></div>

    <!-- ══ السكاشن الاحترافية الجديدة ══ -->
    <div id="storefrontSections"></div>

    <!-- ══ منتجات الصفحة الرئيسية ══ -->
    <div id="productsContainer" class="products-grid"
         style="padding:20px 5%; justify-content:center;"></div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-storage-compat.js"></script>

    <!-- Core files -->
    <script src="js/firebase-init.js"></script>
    <script src="js/store-core.js"></script>
    <script src="js/sections-renderer.js"></script>
    <script src="script.js"></script>

    <script>
    // ══════════════════════════════════════════════════════
    //  السلايدر الإعلاني (البانرات الموجودة في Firebase)
    // ══════════════════════════════════════════════════════
    let currentBannerIndex = 0;
    let bannerInterval;
    let totalBanners = 0;

    window.renderBanners = function () {
        const banners = JSON.parse(localStorage.getItem('eljory_banners') || '[]');
        const slider  = document.getElementById('sliderContainer');
        const dots    = document.getElementById('sliderDots');
        if (!slider) return;

        const active = banners
            .filter(b => b.isActive !== false)
            .sort((a, b) => (a.priority || 0) - (b.priority || 0));

        if (!active.length) { slider.style.display = 'none'; dots.style.display = 'none'; return; }

        totalBanners = active.length;
        slider.style.display = 'block';

        // بناء الشرائح
        let slidesHTML = active.map((b, i) => {
            let action = '';
            if (b.linkType === 'product' && b.linkValue)
                action = `onclick="location.href='product.html?id=${b.linkValue}'"`;
            else if (b.linkType === 'category' && b.linkValue)
                action = `onclick="location.href='shop.html?cat=${b.linkValue}'"`;
            else if (b.linkType === 'subcategory' && b.linkValue)
                action = `onclick="location.href='shop.html?list=${b.linkValue}'"`;
            else if (b.linkType === 'external' && b.linkValue)
                action = `onclick="window.open('${b.linkValue}','_blank')"`;

            return `<div class="slide fade" style="display:${i === 0 ? 'block' : 'none'};${action ? 'cursor:pointer;' : ''}" ${action}>
                        <img src="${b.img}" alt="${b.title || 'El Jory'}">
                    </div>`;
        }).join('');

        // أزرار التنقل (لو أكثر من شريحة)
        const navHTML = active.length > 1
            ? `<a class="prev-slide" onclick="changeSlide(-1)">&#10094;</a>
               <a class="next-slide" onclick="changeSlide(1)">&#10095;</a>`
            : '';

        slider.innerHTML = slidesHTML + navHTML;

        // نقاط التنقل
        if (active.length > 1) {
            dots.style.display = 'block';
            dots.innerHTML = active.map((_, i) =>
                `<span class="slider-dot ${i === 0 ? 'active' : ''}" onclick="goToSlide(${i})"></span>`
            ).join('');
        } else {
            dots.style.display = 'none';
        }

        clearInterval(bannerInterval);
        if (active.length > 1) bannerInterval = setInterval(() => changeSlide(1), 4500);
    };

    window.changeSlide = function (n) {
        const slides = document.querySelectorAll('.slide');
        if (!slides.length) return;
        slides[currentBannerIndex].style.display = 'none';
        updateDot(currentBannerIndex, false);
        currentBannerIndex = (currentBannerIndex + n + slides.length) % slides.length;
        slides[currentBannerIndex].style.display = 'block';
        updateDot(currentBannerIndex, true);
    };

    window.goToSlide = function (idx) {
        const slides = document.querySelectorAll('.slide');
        if (!slides.length) return;
        slides[currentBannerIndex].style.display = 'none';
        updateDot(currentBannerIndex, false);
        currentBannerIndex = idx;
        slides[currentBannerIndex].style.display = 'block';
        updateDot(currentBannerIndex, true);
    };

    function updateDot(idx, active) {
        const dots = document.querySelectorAll('.slider-dot');
        if (dots[idx]) dots[idx].classList.toggle('active', active);
    }

    // ══════════════════════════════════════════════════════
    //  تأثير ظهور السكاشن عند التمرير (Intersection Observer)
    // ══════════════════════════════════════════════════════
    function observeSections() {
        if (!('IntersectionObserver' in window)) {
            // fallback: اعرض كل حاجة مباشرة
            document.querySelectorAll('.jory-section').forEach(el => el.classList.add('visible'));
            return;
        }
        const obs = new IntersectionObserver((entries) => {
            entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); obs.unobserve(e.target); } });
        }, { threshold: 0.08 });
        document.querySelectorAll('.jory-section').forEach(el => obs.observe(el));
    }

    // ══════════════════════════════════════════════════════
    //  التهيئة عند تحميل الصفحة
    // ══════════════════════════════════════════════════════
    document.addEventListener('DOMContentLoaded', () => {
        // انتظر بيانات Firebase (700ms تكفي مع store-core.js)
        setTimeout(() => {
            if (typeof renderBanners             === 'function') renderBanners();
            if (typeof renderStorefrontSections  === 'function') {
                renderStorefrontSections();
                // تشغيل Observer بعد الرندر
                setTimeout(observeSections, 100);
            }
        }, 700);
    });
    </script>
</body>
</html>
