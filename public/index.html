<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Jory Store | الجوري ستور</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>

        /* ══════════════════════════════════════
           BASE
        ══════════════════════════════════════ */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Cairo', sans-serif; background: #f8fafc; color: #1d364a; }

        /* ══════════════════════════════════════
           HEADER
        ══════════════════════════════════════ */
        .jory-header {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: #fff;
            border-bottom: 3px solid #f38c18;
            box-shadow: 0 2px 16px rgba(0,0,0,.07);
        }
        .jory-header-inner {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 24px;
            height: 68px;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        /* اللوجو */
        .jory-logo a { display: flex; align-items: center; }
        .jory-logo img { height: 48px; display: block; }

        /* السيرش */
        .jory-search {
            flex: 1;
            display: flex;
            max-width: 460px;
            margin: 0 auto;
        }
        .jory-search input {
            flex: 1;
            padding: 9px 14px;
            border: 1.5px solid #e2e8f0;
            border-left: none;
            border-radius: 0 8px 8px 0;
            font-family: 'Cairo', sans-serif;
            font-size: 14px;
            outline: none;
            transition: border-color .2s;
            color: #1d364a;
        }
        .jory-search input:focus { border-color: #f38c18; }
        .jory-search button {
            background: #f38c18;
            color: #fff;
            border: none;
            padding: 9px 20px;
            border-radius: 8px 0 0 8px;
            font-family: 'Cairo', sans-serif;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: background .2s;
            white-space: nowrap;
        }
        .jory-search button:hover { background: #d97b0e; }

        /* روابط الناف */
        .jory-nav-actions {
            display: flex;
            align-items: center;
            gap: 4px;
            flex-shrink: 0;
        }
        .jory-nav-link {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 8px 12px;
            border-radius: 8px;
            color: #1d364a;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            transition: background .2s, color .2s;
            white-space: nowrap;
        }
        .jory-nav-link:hover,
        .jory-nav-link.active { background: #fff7ed; color: #f38c18; }

        /* السلة */
        .jory-cart-wrap {
            position: relative;
            display: flex;
            align-items: center;
        }
        .jory-cart-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border-radius: 10px;
            color: #1d364a;
            text-decoration: none;
            transition: background .2s, color .2s;
        }
        .jory-cart-btn:hover { background: #fff7ed; color: #f38c18; }
        /* cart badge — controlled by script.js via display:none/block */
        .cart-badge {
            position: absolute;
            top: -6px;
            left: -6px;
            background: #ef4444;
            color: #fff;
            border-radius: 50%;
            min-width: 18px;
            height: 18px;
            font-size: 11px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 3px;
        }

        /* زرار اللغة */
        .jory-lang-btn {
            background: transparent;
            border: 1.5px solid #e2e8f0;
            border-radius: 8px;
            padding: 6px 14px;
            font-family: 'Cairo', sans-serif;
            font-size: 13px;
            font-weight: 600;
            color: #1d364a;
            cursor: pointer;
            transition: border-color .2s, color .2s;
        }
        .jory-lang-btn:hover { border-color: #f38c18; color: #f38c18; }

        /* زرار الخروج (يُضاف بواسطة script.js داخل headerUserInfo) */
        #headerUserInfo button,
        #headerUserInfo .logout-btn {
            background: #1d364a;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 7px 14px;
            font-family: 'Cairo', sans-serif;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: background .2s;
            white-space: nowrap;
        }
        #headerUserInfo button:hover,
        #headerUserInfo .logout-btn:hover { background: #f38c18; }

        /* Dropdown الأقسام */
        .jory-dropdown { position: relative; }
        .jory-dropdown-menu {
            display: none;
            position: absolute;
            top: calc(100% + 6px);
            right: 0;
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            box-shadow: 0 8px 24px rgba(0,0,0,.1);
            min-width: 200px;
            z-index: 200;
            overflow: hidden;
        }
        .jory-dropdown:hover .jory-dropdown-menu { display: block; }
        .jory-dropdown-menu a {
            display: block;
            padding: 10px 16px;
            color: #1d364a;
            text-decoration: none;
            font-size: 14px;
            font-family: 'Cairo', sans-serif;
            transition: background .15s;
        }
        .jory-dropdown-menu a:hover { background: #fff7ed; color: #f38c18; }

        /* ══ الهامبرجر (موبايل) ══ */
        .jory-hamburger {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            padding: 8px;
            margin-right: auto;
            background: none;
            border: none;
        }
        .jory-hamburger span {
            display: block;
            width: 24px;
            height: 2.5px;
            background: #1d364a;
            border-radius: 2px;
            transition: .3s;
        }
        .jory-hamburger.open span:nth-child(1) { transform: rotate(45deg) translate(5px, 5px); }
        .jory-hamburger.open span:nth-child(2) { opacity: 0; }
        .jory-hamburger.open span:nth-child(3) { transform: rotate(-45deg) translate(5px, -5px); }

        /* ══ Mobile Drawer ══ */
        .jory-mobile-menu {
            display: none;
            flex-direction: column;
            background: #fff;
            border-top: 1px solid #f0f0f0;
            padding: 16px 20px 20px;
            gap: 6px;
        }
        .jory-mobile-menu.open { display: flex; }
        .jory-mobile-menu .jory-search {
            max-width: 100%;
            margin: 0 0 10px;
        }
        .jory-mobile-menu .jory-nav-link {
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 15px;
        }
        .jory-mobile-menu .jory-lang-btn {
            margin-top: 8px;
            align-self: flex-start;
        }

        /* ══════════════════════════════════════
           HERO SECTION
        ══════════════════════════════════════ */
        .jory-hero {
            background: #1d364a;
            padding: 56px 24px 64px;
            text-align: center;
            color: #fff;
            position: relative;
            overflow: hidden;
        }
        .jory-hero-circle-1 {
            position: absolute;
            top: -80px; right: -80px;
            width: 340px; height: 340px;
            background: rgba(243,140,24,.1);
            border-radius: 50%;
            pointer-events: none;
        }
        .jory-hero-circle-2 {
            position: absolute;
            bottom: -100px; left: -100px;
            width: 420px; height: 420px;
            background: rgba(243,140,24,.07);
            border-radius: 50%;
            pointer-events: none;
        }
        .jory-hero-inner {
            position: relative;
            z-index: 1;
            max-width: 680px;
            margin: 0 auto;
        }
        .jory-hero-badge {
            display: inline-block;
            background: rgba(243,140,24,.18);
            color: #f8b468;
            border: 1px solid rgba(243,140,24,.35);
            border-radius: 100px;
            padding: 6px 22px;
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 20px;
        }
        /* النص بيتملى من script.js — الـ fallback شيك */
        .jory-hero h1 {
            font-size: clamp(24px, 5vw, 44px);
            font-weight: 900;
            line-height: 1.4;
            margin-bottom: 14px;
            color: #fff;
            min-height: 1em;
        }
        .jory-hero h1:empty { display: none; }
        .jory-hero p {
            font-size: clamp(14px, 2vw, 17px);
            color: rgba(255,255,255,.7);
            margin-bottom: 32px;
            line-height: 1.85;
            min-height: 1em;
        }
        .jory-hero p:empty { margin-bottom: 32px; }
        .jory-hero-btns {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        /* أزرار الـ Hero */
        .jory-btn-primary {
            background: #f38c18;
            color: #fff;
            border: none;
            border-radius: 10px;
            padding: 13px 32px;
            font-family: 'Cairo', sans-serif;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: background .2s, transform .15s;
        }
        .jory-btn-primary:hover { background: #d97b0e; transform: translateY(-2px); }

        .jory-btn-secondary {
            background: transparent;
            color: #fff;
            border: 2px solid rgba(255,255,255,.3);
            border-radius: 10px;
            padding: 13px 32px;
            font-family: 'Cairo', sans-serif;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: border-color .2s, background .2s;
        }
        .jory-btn-secondary:hover {
            border-color: #f38c18;
            background: rgba(243,140,24,.1);
        }

        /* ══════════════════════════════════════
           السلايدر
        ══════════════════════════════════════ */
        .slider-container {
            max-width: 1200px;
            margin: 32px auto;
            position: relative;
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,.1);
        }
        .slide { display: none; width: 100%; }
        .slide img {
            width: 100%;
            height: auto;
            max-height: 420px;
            object-fit: cover;
            aspect-ratio: 3/1;
            display: block;
        }
        .fade { animation: fade 1.5s; }
        @keyframes fade { from { opacity: .4 } to { opacity: 1 } }
        .prev-slide, .next-slide {
            cursor: pointer;
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            padding: 14px 18px;
            color: #fff;
            font-size: 20px;
            font-weight: bold;
            background: rgba(0,0,0,.3);
            user-select: none;
            z-index: 2;
            transition: background .3s;
        }
        .next-slide { right: 0; border-radius: 8px 0 0 8px; }
        .prev-slide { left: 0;  border-radius: 0 8px 8px 0; }
        .prev-slide:hover, .next-slide:hover { background: rgba(243,140,24,.85); }
        .slider-dots { text-align: center; padding: 10px 0; }
        .slider-dot {
            display: inline-block;
            width: 8px; height: 8px;
            border-radius: 50%;
            background: #d1d5db;
            margin: 0 4px;
            cursor: pointer;
            transition: .3s;
        }
        .slider-dot.active { background: #f38c18; transform: scale(1.3); }

        /* ══════════════════════════════════════
           السكاشن والمنتجات
        ══════════════════════════════════════ */
        #storefrontSections { margin: 10px 0; }
        .products-grid {
            display: flex;
            justify-content: center;
            gap: 24px;
            flex-wrap: wrap;
            padding: 20px 5%;
        }
        .jory-section {
            opacity: 0;
            transform: translateY(20px);
            transition: opacity .5s ease, transform .5s ease;
        }
        .jory-section.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* ══════════════════════════════════════
           MOBILE RESPONSIVE
        ══════════════════════════════════════ */
        @media (max-width: 768px) {
            /* الهيدر */
            .jory-header-inner {
                height: 58px;
                gap: 10px;
                padding: 0 14px;
            }
            .jory-logo img { height: 38px; }

            /* إخفاء عناصر الديسكتوب */
            .jory-search { display: none; }
            .jory-nav-actions { display: none; }

            /* إظهار الهامبرجر */
            .jory-hamburger { display: flex; }

            /* الـ Mobile Drawer يأخذ عرض كامل */
            .jory-mobile-menu {
                padding: 14px 14px 18px;
            }
            .jory-mobile-menu .jory-search {
                max-width: 100%;
                margin: 0 0 10px;
            }

            /* Hero على الموبايل */
            .jory-hero {
                padding: 36px 16px 44px;
            }
            .jory-hero-badge {
                font-size: 12px;
                padding: 5px 16px;
                margin-bottom: 14px;
            }
            .jory-hero h1 {
                font-size: clamp(22px, 6vw, 30px);
                margin-bottom: 12px;
            }
            .jory-hero p {
                font-size: 14px;
                margin-bottom: 24px;
            }
            .jory-hero-btns {
                flex-direction: column;
                align-items: stretch;
                gap: 10px;
            }
            .jory-btn-primary,
            .jory-btn-secondary {
                text-align: center;
                padding: 13px 20px;
                font-size: 15px;
            }

            /* السلايدر على الموبايل */
            .slider-container {
                margin: 16px 12px;
                border-radius: 10px;
            }
            .slide img {
                max-height: 180px;
                aspect-ratio: auto;
                object-fit: cover;
            }
            .prev-slide, .next-slide {
                padding: 10px 12px;
                font-size: 16px;
            }

            /* المنتجات */
            .products-grid {
                gap: 14px;
                padding: 16px 12px;
            }
        }

        @media (max-width: 380px) {
            .jory-header-inner { padding: 0 10px; }
            .jory-logo img { height: 34px; }
            .jory-hero { padding: 28px 12px 36px; }
            .jory-hero h1 { font-size: 20px; }
            .jory-hero p { font-size: 13px; }
        }

    </style>
</head>
<body>

    <!-- ══════════════════════════════════════════════════════
         الهيدر
    ══════════════════════════════════════════════════════ -->
    <header class="jory-header">
        <div class="jory-header-inner">

            <!-- اللوجو -->
            <div class="jory-logo">
                <a href="index.html">
                    <img src="logo.png" alt="الجوري ستور">
                </a>
            </div>

            <!-- السيرش (ديسكتوب) -->
            <form class="jory-search" onsubmit="performSearch(event)">
                <button type="submit">بحث</button>
                <input type="text" id="searchInput" placeholder="ابحث عن منتج...">
            </form>

            <!-- الناف (ديسكتوب) -->
            <nav class="jory-nav-actions">

                <a href="index.html" class="jory-nav-link active" id="navHome">الرئيسية</a>

                <div class="jory-dropdown">
                    <a href="categories.html" class="jory-nav-link" id="navCategories">
                        الأقسام
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none"
                             stroke="currentColor" stroke-width="2.5" style="margin-right:2px;">
                            <polyline points="6 9 12 15 18 9"></polyline>
                        </svg>
                    </a>
                    <div class="jory-dropdown-menu" id="dynamicNavCategories"></div>
                </div>

                <!-- عربة التسوق -->
                <div class="jory-cart-wrap">
                    <a href="cart.html" class="jory-cart-btn" id="navCartIcon" title="السلة">
                        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22"
                             viewBox="0 0 24 24" fill="none" stroke="currentColor"
                             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="9" cy="21" r="1"></circle>
                            <circle cx="20" cy="21" r="1"></circle>
                            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                        </svg>
                    </a>
                    <span id="cartBadge" class="cart-badge" style="display:none;">0</span>
                </div>

                <a href="account.html" class="jory-nav-link" id="navAccount">حسابي</a>

                <!-- معلومات المستخدم (تُملأ من script.js) -->
                <div id="headerUserInfo"></div>

                <!-- زرار اللغة -->
                <button class="jory-lang-btn" id="langBtn">English</button>

            </nav>

            <!-- الهامبرجر (موبايل فقط) -->
            <button class="jory-hamburger" id="hamburgerBtn" aria-label="فتح القائمة">
                <span></span>
                <span></span>
                <span></span>
            </button>

        </div>

        <!-- Mobile Drawer -->
        <div class="jory-mobile-menu" id="mobileMenu">
            <form class="jory-search" onsubmit="performMobileSearch(event)">
                <button type="submit">بحث</button>
                <input type="text" id="searchInputMobile" placeholder="ابحث عن منتج...">
            </form>
            <a href="index.html"       class="jory-nav-link">🏠 الرئيسية</a>
            <a href="categories.html"  class="jory-nav-link">📦 الأقسام</a>
            <a href="cart.html"        class="jory-nav-link">🛒 السلة</a>
            <a href="account.html"     class="jory-nav-link">👤 حسابي</a>
            <button class="jory-lang-btn" onclick="document.getElementById('langBtn').click()">English</button>
        </div>
    </header>

    <!-- ══════════════════════════════════════════════════════
         Hero Section
    ══════════════════════════════════════════════════════ -->
    <section class="jory-hero" id="heroSection">
        <div class="jory-hero-circle-1"></div>
        <div class="jory-hero-circle-2"></div>
        <div class="jory-hero-inner">
            <div class="jory-hero-badge" id="heroBadge">✦ الجوري ستور</div>
            <h1 id="welcomeTitle"></h1>
            <p id="welcomeDesc"></p>
            <div class="jory-hero-btns">
                <a href="categories.html" class="jory-btn-primary">تسوق دلوقتي</a>
                <a href="categories.html" class="jory-btn-secondary">شوف الأقسام</a>
            </div>
        </div>
    </section>

    <!-- ══════════════════════════════════════════════════════
         السلايدر الإعلاني
    ══════════════════════════════════════════════════════ -->
    <div id="sliderContainer" class="slider-container" style="display:none;"></div>
    <div id="sliderDots" class="slider-dots" style="display:none;"></div>

    <!-- ══════════════════════════════════════════════════════
         السكاشن الاحترافية
    ══════════════════════════════════════════════════════ -->
    <div id="storefrontSections"></div>

    <!-- ══════════════════════════════════════════════════════
         منتجات الصفحة الرئيسية
    ══════════════════════════════════════════════════════ -->
    <div id="productsContainer" class="products-grid"></div>

    <!-- ══ Firebase ══ -->
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-storage-compat.js"></script>

    <!-- ══ Core Scripts ══ -->
    <script src="js/firebase-init.js"></script>
    <script src="js/store-core.js"></script>
    <script src="js/sections-renderer.js"></script>
    <script src="script.js"></script>

    <script>
    // ══════════════════════════════════════════════════════
    //  الهامبرجر
    // ══════════════════════════════════════════════════════
    (function () {
        var btn  = document.getElementById('hamburgerBtn');
        var menu = document.getElementById('mobileMenu');
        if (!btn || !menu) return;
        btn.addEventListener('click', function () {
            btn.classList.toggle('open');
            menu.classList.toggle('open');
        });
        // إغلاق الدراور لو الشاشة اتكبّرت
        window.addEventListener('resize', function () {
            if (window.innerWidth > 768) {
                btn.classList.remove('open');
                menu.classList.remove('open');
            }
        });
    })();

    // ══════════════════════════════════════════════════════
    //  بحث الموبايل — يوحّد قيمة السيرش مع الديسكتوب
    // ══════════════════════════════════════════════════════
    function performMobileSearch(e) {
        e.preventDefault();
        var mobileVal = document.getElementById('searchInputMobile').value;
        document.getElementById('searchInput').value = mobileVal;
        if (typeof performSearch === 'function') {
            performSearch(e);
        }
    }

    // ══════════════════════════════════════════════════════
    //  السلايدر الإعلاني
    // ══════════════════════════════════════════════════════
    var currentBannerIndex = 0;
    var bannerInterval;

    window.renderBanners = function () {
        var banners = JSON.parse(localStorage.getItem('eljory_banners') || '[]');
        var slider  = document.getElementById('sliderContainer');
        var dots    = document.getElementById('sliderDots');
        if (!slider) return;

        var active = banners
            .filter(function(b) { return b.isActive !== false; })
            .sort(function(a, b) { return (a.priority || 0) - (b.priority || 0); });

        if (!active.length) {
            slider.style.display = 'none';
            dots.style.display   = 'none';
            return;
        }

        slider.style.display = 'block';

        var slidesHTML = active.map(function(b, i) {
            var action = '';
            if (b.linkType === 'product'     && b.linkValue) action = 'onclick="location.href=\'product.html?id='    + b.linkValue + '\'"';
            else if (b.linkType === 'category'    && b.linkValue) action = 'onclick="location.href=\'shop.html?cat='  + b.linkValue + '\'"';
            else if (b.linkType === 'subcategory' && b.linkValue) action = 'onclick="location.href=\'shop.html?list=' + b.linkValue + '\'"';
            else if (b.linkType === 'external'    && b.linkValue) action = 'onclick="window.open(\'' + b.linkValue + '\',\'_blank\')"';

            return '<div class="slide fade" style="display:' + (i === 0 ? 'block' : 'none') + ';' +
                   (action ? 'cursor:pointer;' : '') + '" ' + action + '>' +
                   '<img src="' + b.img + '" alt="' + (b.title || 'El Jory') + '"></div>';
        }).join('');

        var navHTML = active.length > 1
            ? '<a class="prev-slide" onclick="changeSlide(-1)">&#10094;</a>' +
              '<a class="next-slide" onclick="changeSlide(1)">&#10095;</a>'
            : '';

        slider.innerHTML = slidesHTML + navHTML;

        if (active.length > 1) {
            dots.style.display = 'block';
            dots.innerHTML = active.map(function(_, i) {
                return '<span class="slider-dot ' + (i === 0 ? 'active' : '') +
                       '" onclick="goToSlide(' + i + ')"></span>';
            }).join('');
        } else {
            dots.style.display = 'none';
        }

        clearInterval(bannerInterval);
        if (active.length > 1) bannerInterval = setInterval(function() { changeSlide(1); }, 4500);
    };

    window.changeSlide = function (n) {
        var slides = document.querySelectorAll('.slide');
        if (!slides.length) return;
        slides[currentBannerIndex].style.display = 'none';
        updateDot(currentBannerIndex, false);
        currentBannerIndex = (currentBannerIndex + n + slides.length) % slides.length;
        slides[currentBannerIndex].style.display = 'block';
        updateDot(currentBannerIndex, true);
    };

    window.goToSlide = function (idx) {
        var slides = document.querySelectorAll('.slide');
        if (!slides.length) return;
        slides[currentBannerIndex].style.display = 'none';
        updateDot(currentBannerIndex, false);
        currentBannerIndex = idx;
        slides[currentBannerIndex].style.display = 'block';
        updateDot(currentBannerIndex, true);
    };

    function updateDot(idx, isActive) {
        var dots = document.querySelectorAll('.slider-dot');
        if (dots[idx]) dots[idx].classList.toggle('active', isActive);
    }

    // ══════════════════════════════════════════════════════
    //  Intersection Observer — ظهور السكاشن عند التمرير
    // ══════════════════════════════════════════════════════
    function observeSections() {
        if (!('IntersectionObserver' in window)) {
            document.querySelectorAll('.jory-section').forEach(function(el) {
                el.classList.add('visible');
            });
            return;
        }
        var obs = new IntersectionObserver(function(entries) {
            entries.forEach(function(e) {
                if (e.isIntersecting) {
                    e.target.classList.add('visible');
                    obs.unobserve(e.target);
                }
            });
        }, { threshold: 0.08 });
        document.querySelectorAll('.jory-section').forEach(function(el) {
            obs.observe(el);
        });
    }

    // ══════════════════════════════════════════════════════
    //  التهيئة
    // ══════════════════════════════════════════════════════
    document.addEventListener('DOMContentLoaded', function () {
        setTimeout(function () {
            if (typeof renderBanners            === 'function') renderBanners();
            if (typeof renderStorefrontSections === 'function') {
                renderStorefrontSections();
                setTimeout(observeSections, 100);
            }
        }, 700);
    });
    </script>

</body>
