<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول | الجوري ستور</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo"><img src="logo.png" alt="لوجو الجوري ستور"></div>
        
        <nav style="display: flex; align-items: center; gap: 20px;">
            
            <form onsubmit="performSearch(event)" style="display: flex; gap: 5px; align-items: center; margin: 0;">
                <input type="text" id="searchInput" placeholder="ابحث عن منتج..." style="padding: 8px 12px; border-radius: 4px; border: 1px solid #ccc; outline: none; min-width: 200px;">
                <button type="submit" id="searchBtn" style="background: #f38c18; color: #1d364a; border: none; padding: 8px 15px; border-radius: 4px; font-weight: bold; cursor: pointer; transition: 0.3s;">بحث</button>
            </form>

            <ul>
                <li><a href="index.html" id="navHome">الرئيسية</a></li>
                <li class="dropdown">
                    <a href="categories.html" id="navCategories">الأقسام</a>
                    <div class="dropdown-content" id="dynamicNavCategories"></div>
                </li>
                
                <li style="position: relative; display: inline-flex; align-items: center; margin: 0 5px;">
                    <a href="cart.html" id="navCartIcon" title="السلة" style="color: inherit; display: flex; align-items: center; transition: 0.3s;">
                        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="9" cy="21" r="1"></circle>
                            <circle cx="20" cy="21" r="1"></circle>
                            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                        </svg>
                    </a>
                    <span id="cartBadge" class="cart-badge" style="display:none; position: absolute; top: -10px; right: -10px; background: red; color: white; border-radius: 50%; padding: 2px 6px; font-size: 12px;">0</span>
                </li>
                
                <li><a href="account.html" id="navAccount">حسابي</a></li>
            </ul>
        </nav>

        <div class="header-actions">
            <div class="user-info" id="headerUserInfo"></div>
            <div class="lang-switch"><button id="langBtn">English</button></div>
        </div>
    </header>

    <div class="auth-container" style="max-width: 500px; margin: 50px auto; background: #fff; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);">
        
        <div id="loginFormBox">
            <h2 id="loginTitle" style="text-align: center; color: #1d364a; margin-bottom: 20px;">تسجيل الدخول</h2>
            <form onsubmit="doLogin(event)">
                <div class="form-group">
                    <label id="labelLoginPhone">رقم التليفون</label>
                    <input type="tel" class="form-control" id="loginPhone" required>
                </div>
                <div class="form-group">
                    <label id="labelLoginPassword">كلمة المرور</label>
                    <input type="password" class="form-control" id="loginPassword" required>
                </div>
                <button type="submit" class="btn-auth" id="btnLoginSubmit" style="width: 100%; padding: 12px; background: #1d364a; color: white; border: none; border-radius: 5px; font-weight: bold; font-size: 16px; cursor: pointer;">دخول</button>
            </form>
            <div class="auth-switch" style="text-align: center; margin-top: 15px;">
                <span id="noAccountText">ليس لديك حساب؟</span> 
                <a onclick="toggleAuth('register')" id="linkToRegister" style="color: #f38c18; cursor: pointer; font-weight: bold;">إنشاء حساب جديد</a>
            </div>
            <div style="text-align: center; margin-top: 10px;">
                <a onclick="toggleAuth('forgot')" style="color: #999; cursor: pointer; font-size: 14px;">نسيت كلمة المرور؟</a>
            </div>
        </div>

        <div id="registerFormBox" style="display:none;">
            <h2 id="registerTitle" style="text-align: center; color: #1d364a; margin-bottom: 20px;">إنشاء حساب جديد</h2>
            <form onsubmit="doRegister(event)">
                <div class="form-group">
                    <label id="labelFullName">الاسم بالكامل</label>
                    <input type="text" class="form-control" id="regName" required>
                </div>
                <div class="form-group">
                    <label>رقم التليفون (للدخول)</label>
                    <input type="tel" class="form-control" id="regPhone" required>
                </div>
                <div class="form-group">
                    <label>البريد الإلكتروني (لاسترجاع الحساب)</label>
                    <input type="email" class="form-control" id="regEmail" required>
                </div>
                <div class="form-group">
                    <label>المنطقة / المحافظة</label>
                    <select class="form-control" id="regRegion" required>
                        <option value="">-- اختر المنطقة --</option>
                        </select>
                </div>
                <div class="form-group">
                    <label>العنوان بالتفصيل</label>
                    <input type="text" class="form-control" id="regAddress" required>
                </div>
                <div class="form-group">
                    <label id="labelRegPassword">كلمة المرور</label>
                    <input type="password" class="form-control" id="regPassword" required>
                </div>
                
                <button type="submit" class="btn-auth" style="width: 100%; padding: 12px; background: #28a745; color: white; border: none; border-radius: 5px; font-weight: bold; font-size: 16px; cursor: pointer;">إنشاء الحساب</button>
            </form>
            <div class="auth-switch" style="text-align: center; margin-top: 15px;">
                <span id="hasAccountText">لديك حساب بالفعل؟</span> 
                <a onclick="toggleAuth('login')" style="color: #1d364a; cursor: pointer; font-weight: bold;">تسجيل الدخول</a>
            </div>
        </div>

        <div id="forgotFormBox" style="display:none;">
            <h2 style="text-align: center; color: #1d364a; margin-bottom: 20px;">استرجاع كلمة المرور</h2>
            <p style="text-align: center; color: #666; font-size: 14px; margin-bottom: 20px;">أدخل بريدك الإلكتروني وسنرسل لك كلمة مرور جديدة.</p>
            <form onsubmit="doForgotPassword(event)">
                <div class="form-group">
                    <label>البريد الإلكتروني</label>
                    <input type="email" class="form-control" id="forgotEmail" required>
                </div>
                <button type="submit" class="btn-auth" style="width: 100%; padding: 12px; background: #f38c18; color: #1d364a; border: none; border-radius: 5px; font-weight: bold; font-size: 16px; cursor: pointer;">إرسال كلمة المرور</button>
            </form>
            <div class="auth-switch" style="text-align: center; margin-top: 15px;">
                <a onclick="toggleAuth('login')" style="color: #1d364a; cursor: pointer; font-weight: bold;">العودة لتسجيل الدخول</a>
            </div>
        </div>

    </div>

<!-- 1. مكتبات فايربيس الأساسية (بما فيها الـ Storage عشان الإيرور يختفي) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-storage-compat.js"></script>

    <!-- 2. ملفات متجرك -->
    <script src="js/firebase-init.js"></script>
    <script src="js/store-core.js"></script>
    <script src="script.js"></script>
</body>
</html>
